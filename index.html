<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tercih Cini - İletişim ve Destek</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #f4f7f6;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }
    .container {
      text-align: center;
      background: white;
      padding: 40px 30px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      max-width: 400px;
      width: 90%;
    }
    h1 {
      color: #2c3e50;
      margin-bottom: 10px;
      font-size: 28px;
    }
    p {
      color: #7f8c8d;
      font-size: 15px;
      line-height: 1.5;
      margin-bottom: 30px;
    }
    .btn {
      display: block;
      text-decoration: none;
      color: white;
      padding: 15px 20px;
      border-radius: 30px;
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 15px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    }
    .btn-instagram {
      background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
    }
    .btn-legal {
      background: #34495e;
    }
    .footer-link {
      display: inline-block;
      margin-top: 25px;
      color: #bdc3c7;
      text-decoration: none;
      font-size: 13px;
    }
    .footer-link:hover {
      color: #95a5a6;
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Tercih Cini</h1>
    <p>Bize ulaşmak, yasal metinlerimizi incelemek veya destek almak için aşağıdaki bağlantıları kullanabilirsiniz.</p>
    
    <a href="https://www.instagram.com/tercihcini/" target="_blank" class="btn btn-instagram">
      📸 Instagram'da Bizi Takip Edin
    </a>
    
    <a href="https://sites.google.com/view/decision-genie-legal/home" target="_blank" class="btn btn-legal">
      ⚖️ Gizlilik ve Yasal Metinler
    </a>
    
    <a href="app-ads.txt" target="_blank" class="footer-link">
      📄 app-ads.txt dosyasını görüntüle
    </a>
  </div>

</body>
</html>
